training:
  epochs: 2
  model: deeplabv3plus_backbone
  loss: binary_cross_entropy
  optimizer: adam
  scheduler: null
  early_stopping: null

data:
  dataset: DeepGlobeRoadExtraction
  downloads: data/downloads/
  num_classes: 2

  data_frac: 0.01  # 全体から使用する割合
  split:
    training: 0.7
    validation: 0.15

  loader:
    batch_size: 8
    num_workers: 1
    shuffle_train: true

evaluation:
  metrics: [accuracy, f1, iou, precision, recall]
  task: binary
  average: macro
  save_best_metric: accuracy